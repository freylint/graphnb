name: Publish Notebook to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - notebook.ipynb
      - make.sh
      - assets/**
      - .github/workflows/publish-readme-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install publish dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nbconvert jupyter

      - name: Build notebook site using project script
        run: |
          chmod +x ./make.sh
          ./make.sh publish --hide-code
          mkdir -p public
          cp notebook.html public/index.html
          if [ -d notebook_files ]; then
            cp -r notebook_files public/notebook_files
          fi
          if [ -d assets ]; then
            cp -r assets public/assets
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
