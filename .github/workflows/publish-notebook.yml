name: Publish Notebook to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - notebook.ipynb
      - make.sh
      - assets/**
      - .github/workflows/publish-notebook.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build notebook site in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            chmod +x ./make.sh
            ./make.sh publish --hide-code
            mkdir -p public
            cp notebook.html public/index.html
            if [ -d notebook_files ]; then
              cp -r notebook_files public/notebook_files
            fi
            if [ -d assets ]; then
              cp -r assets public/assets
            fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
